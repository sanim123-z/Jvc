<!DOCTYPE html>
<html lang="ar" dir="rtl" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1cb0f6">
    <link rel="apple-touch-icon" href="https://i.ibb.co/B8MhkW5/Smart-document-folder-202604082000.jpg">

    <title>المسح الذكي</title>
    
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/B8MhkW5/Smart-document-folder-202604082000.jpg">
    
    <!-- React & DOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Libraries (ZIP & PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.error('SW Failed', err));
            });
        }
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary-color)',
                        primaryDark: 'var(--primary-dark)',
                        surface: 'var(--surface-color)',
                        bgApp: 'var(--bg-color)',
                    },
                    boxShadow: {
                        '3d': '0 4px 0 0 var(--primary-dark)',
                        '3d-gray': '0 4px 0 0 rgba(0,0,0,0.15)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary-color: #1cb0f6;
            --primary-dark: #1899d6;
            --surface-color: #ffffff;
            --bg-color: #f7f9fa;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }
        .dark {
            --surface-color: #131f24;
            --bg-color: #0b1416;
            --glass-bg: rgba(19, 31, 36, 0.7);
            color: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Nunito', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- 3D Buttons & Elements --- */
        .btn-3d {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom-width: 4px;
        }
        .btn-3d:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }
        .btn-3d-pressed {
            border-bottom-width: 0px !important;
            transform: translateY(4px) !important;
            opacity: 0.6;
            pointer-events: none;
        }

        .card-3d {
            border: 2px solid rgba(0,0,0,0.05);
            border-bottom-width: 6px;
            border-radius: 1.5rem;
            transition: all 0.2s ease;
        }
        .dark .card-3d { border-color: rgba(255,255,255,0.05); }
        .card-3d:active { border-bottom-width: 2px; transform: translateY(4px); }

        /* --- Animations --- */
        @keyframes flipIn {
            0% { transform: perspective(600px) rotateY(90deg) scale(0.8); opacity: 0; }
            100% { transform: perspective(600px) rotateY(0deg) scale(1); opacity: 1; }
        }
        .flip-in { animation: flipIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* --- Custom App Loader Animations --- */
        @keyframes stepRotate {
            0%, 15% { transform: rotate(0deg); }
            25%, 40% { transform: rotate(90deg); }
            50%, 65% { transform: rotate(180deg); }
            75%, 90% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-step-rotate { 
            animation: stepRotate 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
        }

        @keyframes fastWind {
            0% { transform: translateX(150%); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateX(-150%); opacity: 0; }
        }
        .wind-line-1 { animation: fastWind 1s linear infinite; }
        .wind-line-2 { animation: fastWind 1.3s linear infinite 0.4s; }
        .wind-line-3 { animation: fastWind 1.1s linear infinite 0.2s; }

        /* Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass-panel { border: 2px solid rgba(255, 255, 255, 0.05); }

        /* Compare Slider */
        .img-compare-wrapper { position: relative; overflow: hidden; touch-action: pan-y; isolation: isolate;}
        .img-before { display: block; width: 100%; height: 100%; object-fit: contain; }
        .img-after { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; object-fit: contain; background: var(--bg-color); pointer-events: none; }
        .slider-handle { position: absolute; top: 0; bottom: 0; width: 4px; background: white; z-index: 10; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5);}
        .slider-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border-radius: 50%; background: var(--primary-color);
            border: 4px solid white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 0 var(--primary-dark);
        }
        input[type=range].compare-slider {
            position: absolute; width: 100%; top: 0; bottom: 0; margin: 0; appearance: none;
            background: transparent; z-index: 20; opacity: 0; cursor: ew-resize; outline:none;
        }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .snap-container { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .snap-item { scroll-snap-align: center; }

        /* Crosshair */
        .crosshair-h { position: absolute; top: 50%; left: 10%; right: 10%; height: 2px; background: rgba(255,255,255,0.9); transform: translateY(-50%); mix-blend-mode: difference; }
        .crosshair-v { position: absolute; left: 50%; top: 10%; bottom: 10%; width: 2px; background: rgba(255,255,255,0.9); transform: translateX(-50%); mix-blend-mode: difference; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-primary selection:text-white pb-[env(safe-area-inset-bottom)]">
    <div id="root"></div>

    <script type="text/babel">

        // --- IndexedDB ---
        const DB_NAME = 'AI_Doc_Studio_3D';
        const STORE_NAME = 'scan_projects';
        
        const initDB = () => {
            return new Promise((resolve, reject) => {
                try {
                    const request = indexedDB.open(DB_NAME, 2);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    };
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                } catch (e) { reject(e); }
            });
        };

        const dbOp = async (type, payload = null) => {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, type === 'get' || type === 'getAll' ? 'readonly' : 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    let request;
                    if (type === 'getAll') request = store.getAll();
                    else if (type === 'save') request = store.put(payload);
                    else if (type === 'delete') request = store.delete(payload);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            } catch (error) { return type === 'getAll' ?[] : null; }
        };

        // --- 16 Colors ---
        const THEMES =[
            { main: '#1cb0f6', dark: '#1899d6' }, { main: '#78c800', dark: '#58a700' },
            { main: '#ff4b4b', dark: '#ea2b2b' }, { main: '#ffc800', dark: '#e5b400' },
            { main: '#ce82ff', dark: '#a559d6' }, { main: '#2b70c9', dark: '#205496' },
            { main: '#00e0e0', dark: '#00b3b3' }, { main: '#ff9600', dark: '#cc7800' },
            { main: '#ff82c8', dark: '#d659a0' }, { main: '#8c8c8c', dark: '#666666' },
            { main: '#4b4b4b', dark: '#333333' }, { main: '#00a000', dark: '#007a00' },
            { main: '#d22828', dark: '#a31f1f' }, { main: '#a028c8', dark: '#7a1f99' },
            { main: '#0082c8', dark: '#006296' }, { main: '#e0a000', dark: '#b38000' }
        ];

        // --- Playful Audio ---
        const playTone = (type, enabled) => {
            if (!enabled) return;
            try { if(window.navigator && window.navigator.vibrate) navigator.vibrate(15); } catch(e){}
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            
            if (type === 'pop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1); osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start(); osc.stop(ctx.currentTime + 0.4);
            }
        };

        // --- Premium SVG Icons ---
        const Icon = {

            add: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,

            check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            smartphone: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="3" ry="3"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>,

            sliders: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>,
            text: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>,

            palette: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>,
            folder: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        };

        // --- Custom Modern Loader ---
        const CustomLoader = ({ text }) => (
            <div className="flex flex-col items-center justify-center">
                <div className="relative w-28 h-28 flex flex-col items-center justify-center">
                    {/* Wind Lines */}
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">
                        <div className="absolute top-6 left-0 right-0 h-[2px] bg-primary/40 wind-line-1"></div>
                        <div className="absolute top-12 left-0 right-0 h-[3px] bg-primary/30 wind-line-2"></div>
                        <div className="absolute top-16 left-0 right-0 h-[2px] bg-primary/50 wind-line-3"></div>
                    </div>
                    
                    {/* Rotating App Icon */}
                    <div className="w-14 h-14 bg-primary text-white rounded-2xl flex items-center justify-center shadow-lg z-10 animate-step-rotate">
                        <div className="w-8 h-8">{Icon.folder}</div>
                    </div>
                    
                    {/* Ground Line */}
                    <div className="w-20 h-1.5 bg-primary rounded-full mt-5 z-10 shadow-[0_0_10px_var(--primary-color)]"></div>
                </div>
                {text && <span className="mt-4 font-bold text-primary bg-white/90 dark:bg-black/80 px-5 py-2 rounded-xl shadow-sm tracking-wide">{text}</span>}
            </div>
        );

        const App = () => {
            const[view, setView] = React.useState(null); 
            const[activeTab, setActiveTab] = React.useState('HOME'); 
            
            const[settings, setSettings] = React.useState({ 
                lang: 'ar', isDark: false, colorTheme: THEMES[0], 
                sound: true, intensity: 185, layoutMode: window.innerWidth > 768 ? 'desktop' : 'phone'
            });
            const[projects, setProjects] = React.useState([]);
            const[currProject, setCurrProject] = React.useState(null);
            const[imgIndex, setImgIndex] = React.useState(0);

            const[showProjSettings, setShowProjSettings] = React.useState(false);
            const[projIntensity, setProjIntensity] = React.useState(185);
            const lastProjIntensity = React.useRef(185);
            const[isProcessingProj, setIsProcessingProj] = React.useState(false);

            const[showImgSettings, setShowImgSettings] = React.useState(false);
            const[localIntensity, setLocalIntensity] = React.useState(185);
            const lastProcessedIntensity = React.useRef(185);
            const[isProcessingImg, setIsProcessingImg] = React.useState(false);

            const[showTextSettings, setShowTextSettings] = React.useState(false);
            const [wmText, setWmText] = React.useState('');
            const[wmColor, setWmColor] = React.useState(THEMES[0].main);
            const[wmRotation, setWmRotation] = React.useState(-30); 
            const[wmSize, setWmSize] = React.useState(100); 

            // ميزة مسح اللون والتكبير
            const[colorEraserMode, setColorEraserMode] = React.useState(false);
            const[pickedColor, setPickedColor] = React.useState(null);
            const[isPicking, setIsPicking] = React.useState(false);
            const[showConfirmEraser, setShowConfirmEraser] = React.useState(false);
            const canvasRef = React.useRef(null);
            const pressTimer = React.useRef(null);
            
            const [zoomLevel, setZoomLevel] = React.useState(1);
            const[panOrigin, setPanOrigin] = React.useState({x: 50, y: 50});
            const[autoPalette, setAutoPalette] = React.useState([]);
            const[showPalette, setShowPalette] = React.useState(false);

            const isDesktop = settings.layoutMode === 'desktop';

            React.useEffect(() => {
                try {
                    const s = localStorage.getItem('DocScan3D_Settings');
                    if (s) { 
                        const parsed = JSON.parse(s); 
                        if(!parsed.intensity) parsed.intensity = 185; 
                        if(!parsed.layoutMode) parsed.layoutMode = window.innerWidth > 768 ? 'desktop' : 'phone'; 
                        setSettings(parsed); 
                        applySkin(parsed.colorTheme, parsed.isDark); 
                        setWmColor(parsed.colorTheme.main);
                    } else { applySkin(settings.colorTheme, settings.isDark); }
                } catch(e) { applySkin(settings.colorTheme, settings.isDark); }
                grabHistory();

                const checkIncomingSharedFiles = async () => {
                    try {
                        const db = await new Promise((resolve, reject) => {
                            const request = indexedDB.open('AI_Doc_Studio_Shared', 1);
                            request.onupgradeneeded = (e) => {
                                if (!e.target.result.objectStoreNames.contains('shared_files')) {
                                    e.target.result.createObjectStore('shared_files', { autoIncrement: true });
                                }
                            };
                            request.onsuccess = () => resolve(request.result);
                            request.onerror = () => reject(request.error);
                        });
                        if(db.objectStoreNames.contains('shared_files')) {
                            const tx = db.transaction('shared_files', 'readwrite');
                            const store = tx.objectStore('shared_files');
                            const getAllReq = store.getAll();
                            getAllReq.onsuccess = async () => {
                                const files = getAllReq.result;
                                if (files && files.length > 0) {
                                    store.clear(); await handleIncomingSharedFiles(files);
                                }
                            };
                        }
                    } catch (e) {}
                };
                checkIncomingSharedFiles();
            },[]);

            React.useEffect(() => {
                try { localStorage.setItem('DocScan3D_Settings', JSON.stringify(settings)); } catch(e) {}
                applySkin(settings.colorTheme, settings.isDark);
                settings.isDark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
            }, [settings]);

            React.useEffect(() => {
                if (view === 'IMAGE_DETAIL' || view === 'COLOR_ERASER') {
                    setLocalIntensity(settings.intensity); lastProcessedIntensity.current = settings.intensity;
                    setShowImgSettings(false); setShowTextSettings(false);
                    setZoomLevel(1); setPanOrigin({x: 50, y: 50});
                    setAutoPalette([]); setShowPalette(false);
                }
            },[imgIndex, view]);

            React.useEffect(() => {
                if (view === 'COLOR_ERASER' && currProject && canvasRef.current) {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = canvasRef.current;
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d', { willReadFrequently: true });
                        ctx.drawImage(img, 0, 0);
                        extractAutoPalette(ctx, canvas);
                    };
                    img.src = currProject.dSet[imgIndex].wURL || currProject.dSet[imgIndex].rURL;
                }
            },[view, imgIndex, currProject]);

            const applySkin = (theme, isDark) => {
                const r = document.documentElement;
                r.style.setProperty('--primary-color', theme.main);
                r.style.setProperty('--primary-dark', theme.dark);
                const metaThemeColor = document.querySelector('meta[name="theme-color"]');
                if (metaThemeColor) metaThemeColor.setAttribute("content", theme.main);
            };

            const grabHistory = async () => { try { const p = await dbOp('getAll'); if(p) setProjects(p.sort((a,b)=>b.id-a.id)); } catch(e){} };
            const snd = (type='pop') => playTone(type, settings.sound);

            // --- Engine with Integrated Color Eraser ---
            const processPixels = (img, threshold, targetColor = null) => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const dat = imgData.data;
                    
                    const eraseTolerance = threshold * 0.4;

                    for (let i = 0; i < dat.length; i += 4) {
                        const R = dat[i], G = dat[i+1], B = dat[i+2];

                        if (targetColor) {
                            const dist = Math.sqrt(Math.pow(R - targetColor[0], 2) + Math.pow(G - targetColor[1], 2) + Math.pow(B - targetColor[2], 2));
                            if (dist < eraseTolerance) {
                                dat[i]=255; dat[i+1]=255; dat[i+2]=255;
                                continue; 
                            }
                        }

                        const lum = R * 0.299 + G * 0.587 + B * 0.114;
                        const contrastDev = Math.max(R,G,B) - Math.min(R,G,B);

                        if (lum > threshold || (lum > threshold - 45 && contrastDev > 15)) {
                            dat[i]=255; dat[i+1]=255; dat[i+2]=255; 
                        } else {
                            if(lum < 90) { dat[i]-=15; dat[i+1]-=15; dat[i+2]-=15; }
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg', 0.88));
                });
            };

            const reprocessImageFromURL = (oURL, threshold, targetColor = null) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = async () => resolve(await processPixels(img, threshold, targetColor));
                    img.src = oURL;
                });
            };

            const smartFilterEngine = (file, threshold) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const oURL = e.target.result;
                        const img = new Image();
                        img.onload = async () => resolve({ n: file.name, oURL, rURL: await processPixels(img, threshold) }); 
                        img.src = oURL;
                    }; reader.readAsDataURL(file);
                });
            };

            const applyTextToImage = (base64Img, text, color, rotation = -30, size = 100) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        if (text && text.trim() !== '') {
                            const baseFontSize = Math.max(img.width / 12, 40);
                            const finalFontSize = baseFontSize * (size / 100);
                            ctx.font = `bold ${finalFontSize}px 'Nunito', sans-serif`;
                            ctx.fillStyle = color; ctx.globalAlpha = 0.5; 
                            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.translate(canvas.width / 2, canvas.height / 2);
                            ctx.rotate((rotation * Math.PI) / 180); 
                            ctx.fillText(text, 0, 0);
                        }
                        resolve(canvas.toDataURL('image/jpeg', 0.88));
                    }; img.src = base64Img;
                });
            };

            const applyTextToProject = async () => {
                if (!currProject || !wmText.trim()) return;
                snd('pop'); setIsProcessingProj(true); setShowTextSettings(false);
                try {
                    let updatedCluster =[];
                    for (let f of currProject.dSet) {
                        const watermarkedURL = await applyTextToImage(f.rURL, wmText, wmColor, wmRotation, wmSize);
                        updatedCluster.push({ ...f, wURL: watermarkedURL });
                    }
                    const updatedProject = { ...currProject, dSet: updatedCluster };
                    await dbOp('save', updatedProject);
                    setCurrProject(updatedProject);
                    setProjects(prev => prev.map(p => p.id === updatedProject.id ? updatedProject : p));
                    snd('success');
                } catch(e) {}
                setIsProcessingProj(false);
            };

            const removeTextFromProject = async () => {
                if (!currProject) return;
                snd('pop'); setIsProcessingProj(true); setShowTextSettings(false);
                setWmText(''); setWmRotation(-30); setWmSize(100);
                try {
                    let updatedCluster = currProject.dSet.map(f => { const newF = { ...f }; delete newF.wURL; return newF; });
                    const updatedProject = { ...currProject, dSet: updatedCluster };
                    await dbOp('save', updatedProject);
                    setCurrProject(updatedProject);
                    setProjects(prev => prev.map(p => p.id === updatedProject.id ? updatedProject : p));
                    snd('success');
                } catch(e) {}
                setIsProcessingProj(false);
            };

            // --- خوارزمية استخراج الألوان (Frequency Map) ---
            const extractAutoPalette = (ctx, canvas) => {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const colorMap = {};
                const step = 4 * 12; 

                for (let i = 0; i < imgData.length; i += step) {
                    const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
                    if ((r > 220 && g > 220 && b > 220) || (r < 40 && g < 40 && b < 40)) continue;
                    
                    const qr = Math.round(r / 32) * 32;
                    const qg = Math.round(g / 32) * 32;
                    const qb = Math.round(b / 32) * 32;
                    const key = `${qr},${qg},${qb}`;

                    if (!colorMap[key]) colorMap[key] = { count: 0, rgb:[r, g, b] };
                    colorMap[key].count++;
                }

                const sortedColors = Object.values(colorMap).sort((a, b) => b.count - a.count).slice(0, 7).map(c => c.rgb);
                setAutoPalette(sortedColors);
            };

            const handlePointerDownEraser = (e) => {
                e.target.setPointerCapture(e.pointerId);
                setShowConfirmEraser(false);
                const rect = canvasRef.current.getBoundingClientRect();
                const xPct = ((e.clientX - rect.left) / rect.width) * 100;
                const yPct = ((e.clientY - rect.top) / rect.height) * 100;

                pressTimer.current = setTimeout(() => {
                    snd('pop'); setIsPicking(true); handlePointerMoveEraser(e);
                }, 400);

                canvasRef.current.dataset.clickX = xPct;
                canvasRef.current.dataset.clickY = yPct;
                canvasRef.current.dataset.moved = 'false';
            };

            const handlePointerMoveEraser = (e) => {
                if (canvasRef.current) canvasRef.current.dataset.moved = 'true';
                if (!isPicking || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                    const pixel = ctx.getImageData(x, y, 1, 1).data;
                    setPickedColor([pixel[0], pixel[1], pixel[2]]);
                }
            };

            const handlePointerUpEraser = (e) => {
                e.target.releasePointerCapture(e.pointerId);
                clearTimeout(pressTimer.current);

                if (isPicking) {
                    setIsPicking(false);
                    if (pickedColor) setShowConfirmEraser(true);
                } else {
                    const moved = canvasRef.current.dataset.moved === 'true';
                    if (!moved) {
                        const cx = parseFloat(canvasRef.current.dataset.clickX);
                        const cy = parseFloat(canvasRef.current.dataset.clickY);
                        setPanOrigin({x: cx, y: cy});
                        if (zoomLevel === 1) { snd(); setZoomLevel(2.5); }
                    }
                }
            };

            const executeColorEraser = async () => {
                snd('pop'); setView('LOADING');
                await new Promise(r => setTimeout(r, 50)); 
                try {
                    const updatedProject = { ...currProject, targetColor: pickedColor };
                    let updatedCluster =[];
                    for (let f of updatedProject.dSet) {
                        const newRURL = await reprocessImageFromURL(f.oURL, projIntensity, pickedColor);
                        let newWURL = f.wURL ? await applyTextToImage(newRURL, wmText, wmColor, wmRotation, wmSize) : null;
                        updatedCluster.push({ ...f, rURL: newRURL, ...(newWURL && {wURL: newWURL}) });
                    }
                    updatedProject.dSet = updatedCluster;
                    setCurrProject(updatedProject);
                    setProjects(prev => prev.map(p => p.id === updatedProject.id ? updatedProject : p));
                    await dbOp('save', updatedProject);
                    snd('success');

                setView('COLOR_ERASER');
                setShowConfirmEraser(false); setPickedColor(null);
            };

            React.useEffect(() => {
                if (view !== 'IMAGE_DETAIL' || localIntensity === null || !currProject) return;
                if (localIntensity === lastProcessedIntensity.current) return;
                const timer = setTimeout(async () => {
                    setIsProcessingImg(true);
                    try {
                        const newRURL = await reprocessImageFromURL(currProject.dSet[imgIndex].oURL, localIntensity, currProject.targetColor);
                        let newWURL = currProject.dSet[imgIndex].wURL ? await applyTextToImage(newRURL, wmText, wmColor, wmRotation, wmSize) : null;
                        const updatedProject = { ...currProject };
                        updatedProject.dSet[imgIndex].rURL = newRURL;
                        if(newWURL) updatedProject.dSet[imgIndex].wURL = newWURL;
                        setCurrProject(updatedProject);
                        setProjects(prev => prev.map(p => p.id === updatedProject.id ? updatedProject : p));
                        await dbOp('save', updatedProject);
                        lastProcessedIntensity.current = localIntensity;
                    } catch(e) {}
                    setIsProcessingImg(false);
                }, 300);
                return () => clearTimeout(timer);
            },[localIntensity]);

            React.useEffect(() => {

                const timer = setTimeout(async () => {
                    setIsProcessingProj(true);
                    try {
                        let updatedCluster =[];
                        for (let f of currProject.dSet) {
                            const newRURL = await reprocessImageFromURL(f.oURL, projIntensity, currProject.targetColor);
                            let newWURL = f.wURL ? await applyTextToImage(newRURL, wmText, wmColor, wmRotation, wmSize) : null;
                            updatedCluster.push({ ...f, rURL: newRURL, ...(newWURL && {wURL: newWURL}) });
                        }
                        const updatedProject = { ...currProject, dSet: updatedCluster };
                        await dbOp('save', updatedProject);
                        setCurrProject(updatedProject);
                        setProjects(prev => prev.map(p => p.id === updatedProject.id ? updatedProject : p));
                        lastProjIntensity.current = projIntensity;
                    } catch(e) {}
                    setIsProcessingProj(false);
                }, 600); 
                return () => clearTimeout(timer);
            },[projIntensity]);


            const dispatchScannerFlow = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                snd('pop'); setView('LOADING');
                let cluster =[];
                for (let f of files) {
                    if (f.type.startsWith('image/')) {
                        const processedData = await smartFilterEngine(f, settings.intensity);
                        cluster.push(processedData);
                    }
                }
                const rec = { id: Date.now(), nm: `مشروع ${new Date().toLocaleDateString('ar-EG')}`, dSet: cluster, targetColor: null };
                await dbOp('save', rec); snd('success'); await grabHistory();
                setCurrProject(rec); setProjIntensity(settings.intensity); lastProjIntensity.current = settings.intensity;
                setShowProjSettings(false); setShowTextSettings(false); setColorEraserMode(false);
                if(!projects.find(p => p.id === rec.id)) setProjects([rec, ...projects]);
                setView('PROJECT'); e.target.value = ''; 
            };

            const handleIncomingSharedFiles = async (files) => {
                if (!files || !files.length) return;
                snd('pop'); setView('LOADING');
                let currentIntensity = 185;
                try { const s = localStorage.getItem('DocScan3D_Settings'); if (s) { const parsed = JSON.parse(s); if(parsed.intensity) currentIntensity = parsed.intensity; } } catch(e){}
                let cluster =[];
                for (let f of files) {
                    if (f && f.type && f.type.startsWith('image/')) cluster.push(await smartFilterEngine(f, currentIntensity));
                }
                if (cluster.length > 0) {
                    const rec = { id: Date.now(), nm: `مشروع ${new Date().toLocaleDateString('ar-EG')}`, dSet: cluster, targetColor: null };
                    await dbOp('save', rec); snd('success'); await grabHistory();
                    setCurrProject(rec); setProjIntensity(currentIntensity); lastProjIntensity.current = currentIntensity;
                    setShowProjSettings(false); setShowTextSettings(false); setColorEraserMode(false);
                    setProjects(prev => { if(!prev.find(p => p.id === rec.id)) return[rec, ...prev]; return prev; });
                    setView('PROJECT');
                } else setView(null);
            };

            const expZIP = async (proj) => {
                snd(); const zip = new JSZip();
                proj.dSet.forEach((itm, i) => { zip.file(`Image_${i+1}.jpg`, (itm.wURL || itm.rURL).split(',')[1], {base64:true}); });
                const bx = await zip.generateAsync({type:"blob"});
                const anchor = document.createElement('a'); anchor.href = URL.createObjectURL(bx); anchor.download = `${proj.nm}.zip`; anchor.click();
            };

            const expPDF = (proj) => {
                snd(); const { jsPDF } = window.jspdf; const pr_doc = new jsPDF('p', 'mm', 'a4'); 
                proj.dSet.forEach((item, j) => {
                    if (j > 0) pr_doc.addPage();
                    const imgData = item.wURL || item.rURL;
                    const spec = pr_doc.getImageProperties(imgData);
                    const doc_W = pr_doc.internal.pageSize.getWidth();
                    const doc_H = (spec.height * doc_W) / spec.width;
                    pr_doc.addImage(imgData, 'JPEG', 0, 0, doc_W, doc_H);
                }); pr_doc.save(`${proj.nm}.pdf`);
            };

            const downloadAllDirect = async (proj) => {
                snd();
                for (let i = 0; i < proj.dSet.length; i++) {
                    const anchor = document.createElement('a'); anchor.href = proj.dSet[i].wURL || proj.dSet[i].rURL; anchor.download = `Clean_${i+1}.jpg`; anchor.click();
                    await new Promise(r => setTimeout(r, 300));
                }
            };

            const downloadSingle = (url, name) => {
                snd(); const anchor = document.createElement('a'); anchor.href = url; anchor.download = `Clean_${name}.jpg`; anchor.click();
            };

            const shareProject = async (proj) => {
                snd();
                if (!navigator.share) { alert('المشاركة غير مدعومة في هذا المتصفح'); return; }
                try {
                    let fileArray =[];
                    if (proj.dSet.length === 1) {
                        const imgData = proj.dSet[0].wURL || proj.dSet[0].rURL;
                        const res = await fetch(imgData); const blob = await res.blob();
                        fileArray.push(new File([blob], `Cleaned_Image.jpg`, { type: 'image/jpeg' }));
                    } else {
                        const { jsPDF } = window.jspdf; const pr_doc = new jsPDF('p', 'mm', 'a4'); 
                        proj.dSet.forEach((item, j) => {
                            if (j > 0) pr_doc.addPage();
                            const imgData = item.wURL || item.rURL;
                            const spec = pr_doc.getImageProperties(imgData);
                            const doc_W = pr_doc.internal.pageSize.getWidth();
                            const doc_H = (spec.height * doc_W) / spec.width;
                            pr_doc.addImage(imgData, 'JPEG', 0, 0, doc_W, doc_H);
                        });
                        const pdfBlob = pr_doc.output('blob');
                        fileArray.push(new File([pdfBlob], `${proj.nm}.pdf`, { type: 'application/pdf' }));
                    }
                    if (navigator.canShare && navigator.canShare({ files: fileArray })) await navigator.share({ title: proj.nm, text: 'تم التعديل باستخدام تطبيق المسح الذكي!', files: fileArray });
                    else await navigator.share({ title: proj.nm, text: 'تم التعديل باستخدام تطبيق المسح الذكي!' });
                } catch (err) {}
            };

            const deleteProject = async (id) => {
                snd();
                if(confirm('هل أنت متأكد من حذف هذا المشروع؟')) {
                    await dbOp('delete', id); await grabHistory();
                    if(currProject?.id === id) { setView(null); setColorEraserMode(false); }
                }
            };

            // --- Views ---

            if (view === 'LOADING') return (
                <div className="fixed inset-0 bg-white/95 dark:bg-[#0b1416]/95 backdrop-blur-md z-[100] flex items-center justify-center pop-in">
                    <CustomLoader text="جاري المعالجة..." />
                </div>
            );
            
            if (view === 'PROJECT' && currProject) return (
                <div className={`fixed inset-0 z-40 bgApp overflow-hidden pop-in flex flex-col ${isDesktop ? 'md:pr-28' : ''}`}>
                    <div className="glass-panel px-4 py-5 z-20 flex justify-between items-center rounded-b-3xl shadow-sm shrink-0">
                         <button onClick={()=>{snd(); setView(null); setColorEraserMode(false);}} className={`btn-3d w-14 h-14 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-2xl flex items-center justify-center border-gray-200 dark:border-gray-700 ${isDesktop ? 'hidden' : 'flex'}`}>
                             <div className="w-7 h-7 rtl:hidden">{Icon.arrowLTR}</div><div className="w-7 h-7 ltr:hidden">{Icon.arrowRTL}</div>
                         </button>
                         <h2 className="text-xl font-bold dark:text-white truncate px-2">{currProject.nm}</h2>
                         <button onClick={()=>deleteProject(currProject.id)} className={`btn-3d w-14 h-14 bg-red-100 text-red-500 rounded-2xl flex items-center justify-center border-red-200 ${isDesktop ? 'hidden' : 'flex'}`}>
                            <div className="w-7 h-7">{Icon.trash}</div>
                         </button>
                    </div>

                    {colorEraserMode && (
                        <div className="bg-primary/10 dark:bg-primary/20 border border-primary/30 text-primary px-4 py-3 mx-4 mt-4 rounded-xl text-center font-bold text-sm animate-pulse z-20 shrink-0">
                            اختر صورة من الأسفل لفتح أداة مسح الألوان والتكبير
                        </div>
                    )}
                    
                    <div className="flex-1 overflow-y-auto overflow-x-hidden p-4 pb-36 hide-scroll relative">
                        <div className={`grid gap-4 ${isDesktop ? 'grid-cols-4 lg:grid-cols-5' : 'grid-cols-2 md:grid-cols-3'}`}>
                             {currProject.dSet.map((entry, index) => (
                                 <div key={index} 
                                      onClick={()=>{snd(); setImgIndex(index); if (colorEraserMode) { setView('COLOR_ERASER'); setColorEraserMode(false); } else { setView('IMAGE_DETAIL'); } }} 
                                      className="card-3d glass-panel p-2 flex items-center justify-center cursor-pointer flip-in"
                                      style={{animationDelay: `${index * 0.1}s`}}>
                                      <div className="w-full aspect-[3/4] rounded-xl overflow-hidden bg-gray-100 dark:bg-gray-800 flex items-center justify-center relative">
                                         <img src={entry.wURL || entry.rURL} className="w-full h-full object-contain" />
                                      </div>
                                 </div>
                             ))}
                        </div>
                        {isProcessingProj && (
                            <div className="absolute inset-0 bg-white/60 dark:bg-black/60 backdrop-blur-sm z-20 flex items-center justify-center rounded-3xl m-4 border-4 border-transparent">
                                <CustomLoader text="جاري التحديث..." />
                            </div>
                        )}
                    </div>

                    {/* Popups */}
                    {showProjSettings && (
                        <div className={`absolute z-40 flex justify-center pointer-events-none ${isDesktop ? 'right-32 bottom-28' : 'bottom-[110px] inset-x-4'}`}>
                            <div className="pointer-events-auto w-full max-w-sm glass-panel p-6 rounded-3xl flex flex-col items-center gap-4 shadow-2xl pop-in border-2 border-primary/20">
                                <span className="text-sm font-bold text-gray-700 dark:text-gray-300">قوة التنظيف لجميع الصور (ومسح اللون)</span>
                                <input type="range" min="100" max="240" value={projIntensity} onChange={(e)=>setProjIntensity(parseInt(e.target.value))} className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary" style={{ direction: 'ltr' }} />
                            </div>
                        </div>
                    )}
                    {showTextSettings && (
                        <div className={`absolute z-50 flex justify-center pointer-events-none ${isDesktop ? 'right-32 bottom-28' : 'bottom-[110px] inset-x-4'}`}>
                            <div className="pointer-events-auto w-full max-w-sm glass-panel p-6 rounded-3xl flex flex-col items-center gap-4 shadow-2xl pop-in border-2 border-primary/20">
                                <span className="text-sm font-bold text-gray-700 dark:text-gray-300">إضافة نص / علامة مائية</span>
                                <input type="text" placeholder="اكتب الاسم هنا..." value={wmText} onChange={(e)=>setWmText(e.target.value)} className="w-full px-4 py-3 rounded-xl bg-gray-100 dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 outline-none focus:border-primary dark:text-white font-bold" />
                                <div className="flex gap-2 overflow-x-auto w-full py-2 hide-scroll snap-container">
                                    {THEMES.map((t, i) => ( <button key={i} onClick={()=>{snd(); setWmColor(t.main)}} className="min-w-[36px] w-9 h-9 rounded-full flex items-center justify-center shrink-0 snap-item transition-transform hover:scale-110" style={{ backgroundColor: t.main, boxShadow: wmColor === t.main ? `0 0 0 2px var(--bg-color), 0 0 0 4px ${t.main}` : 'none' }}></button> ))}
                                </div>
                                <div className="w-full">
                                    <div className="flex justify-between text-xs font-bold text-gray-500 dark:text-gray-400 mb-2"><span>حجم النص</span><span>{wmSize}%</span></div>
                                    <input type="range" min="20" max="300" value={wmSize} onChange={(e)=>setWmSize(parseInt(e.target.value))} className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary" style={{ direction: 'ltr' }} />
                                </div>

                                        <div className="flex justify-between items-center mb-5">
                                            <h3 className="font-bold text-xl dark:text-white">قوة التنظيف الافتراضية</h3>
                                            <button onClick={()=>{snd(); setSettings({...settings, intensity: 185})}} className="text-sm text-primary font-bold bg-primary/10 px-4 py-2 rounded-xl">الافتراضي</button>
                                        </div>
                                        <input type="range" min="100" max="240" value={settings.intensity} onChange={(e)=>setSettings({...settings, intensity: e.target.value})} className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary" />
                                        <p className="text-sm text-gray-500 mt-3 text-center font-bold">اسحب لتعديل سُمك الإزالة للصور والألوان الجديدة</p>
                                    </div>

                                    <div className="card-3d glass-panel p-6 flex flex-col gap-5">
                                        <div className="flex justify-between items-center">
                                            <span className="font-bold text-xl dark:text-white">الأصوات المرحة</span>
                                            <button onClick={()=>{snd(); setSettings({...settings, sound: !settings.sound})}} className={`w-16 h-10 rounded-full p-1 transition-colors ${settings.sound ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'}`}>
                                                <div className={`w-8 h-8 bg-white rounded-full transition-transform ${settings.sound ? 'translate-x-[-24px]' : 'translate-x-0'}`}></div>
                                            </button>
                                        </div>
                                        <hr className="border-gray-200 dark:border-gray-700" />
                                        <div className="flex justify-between items-center">
                                            <span className="font-bold text-xl dark:text-white">الوضع الليلي</span>
                                            <button onClick={()=>{snd(); setSettings({...settings, isDark: !settings.isDark})}} className={`w-16 h-10 rounded-full p-1 transition-colors ${settings.isDark ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'}`}>
                                                <div className={`w-8 h-8 bg-white rounded-full transition-transform ${settings.isDark ? 'translate-x-[-24px]' : 'translate-x-0'}`}></div>
                                            </button>
                                        </div>
                                    </div>
                                 </div>
                             </div>
                        )}
                    </div>

                   {!isDesktop && (
                       <div className="fixed inset-x-0 bottom-0 p-5 z-40 pointer-events-none flex justify-center">
                           <div className="pointer-events-auto w-full max-w-md glass-panel rounded-[2rem] h-20 flex items-center justify-between px-8 shadow-[0_-5px_30px_rgba(0,0,0,0.08)]">
                                <button onClick={()=>{snd(); setActiveTab('HOME');}} className={`flex flex-col items-center gap-1 transition-all ${activeTab==='HOME'?'text-primary scale-110':'text-gray-400'}`}>
                                    <div className="w-8 h-8">{Icon.home}</div> 
                                </button>
                                
                                {/* الزر العائم (FAB) بالحجم الصغير والمثالي */}
                                <div className="relative -top-8">
                                    <label className="btn-3d w-20 h-20 bg-primary text-white rounded-[2rem] flex items-center justify-center cursor-pointer border-primaryDark shadow-2xl">
                                        <input type="file" multiple accept="image/*" className="hidden" onChange={dispatchScannerFlow} />
                                        <div className="w-10 h-10">{Icon.add}</div>
                                    </label>
                                </div>
                                
                                <button onClick={()=>{snd(); setActiveTab('SETTINGS');}} className={`flex flex-col items-center gap-1 transition-all ${activeTab==='SETTINGS'?'text-primary scale-110':'text-gray-400'}`}>
                                    <div className="w-8 h-8">{Icon.settings}</div>
                                </button>
                           </div>
                       </div>
                   )}
                </div>
            );
        }

        const ImageComparer = ({orig, pure}) => {
             const[pos, setPos] = React.useState(50);
             return (
                 <div className="img-compare-wrapper rounded-3xl overflow-hidden shadow-lg relative w-full h-full max-h-[75vh] glass-panel border-4 border-white dark:border-gray-700">
                        <img className="img-before" src={orig} />
                        <img className="img-after" src={pure} style={{ clipPath: `inset(0 0 0 ${100-pos}%)` }} />
                        <div className="slider-handle" style={{ right: `${pos}%` }}>
                            <div className="slider-button"><div className="w-6 h-6 text-white">{Icon.arrowRTL}</div></div>
                        </div>
                        <input type="range" min="0" max="100" value={pos} onChange={(e)=>setPos(e.target.value)} className="compare-slider" />
                        <div className="absolute top-5 right-5 bg-black/60 text-white px-4 py-2 rounded-xl text-sm font-bold backdrop-blur">قبل</div>
                        <div className="absolute top-5 left-5 bg-primary text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md">بعد</div>
                 </div>
             )
        };

        const r = ReactDOM.createRoot(document.getElementById('root'));
        r.render(<App />);
    </script>
</body>
</html>
