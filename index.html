<!DOCTYPE html>
<html lang="ar" dir="rtl" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المسح الذكي - 3D Pro</title>
    
    <!-- React & DOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Libraries (ZIP & PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary-color)',
                        primaryDark: 'var(--primary-dark)',
                        surface: 'var(--surface-color)',
                        bgApp: 'var(--bg-color)',
                    },
                    boxShadow: {
                        '3d': '0 4px 0 0 var(--primary-dark)',
                        '3d-gray': '0 4px 0 0 rgba(0,0,0,0.15)',
                        '3d-dark': '0 4px 0 0 rgba(255,255,255,0.1)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary-color: #1cb0f6;
            --primary-dark: #1899d6;
            --surface-color: #ffffff;
            --bg-color: #f7f9fa;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }
        .dark {
            --surface-color: #131f24;
            --bg-color: #0b1416;
            --glass-bg: rgba(19, 31, 36, 0.7);
            color: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Nunito', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- 3D Buttons & Elements --- */
        .btn-3d {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom-width: 4px;
        }
        .btn-3d:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }

        .card-3d {
            border: 2px solid rgba(0,0,0,0.05);
            border-bottom-width: 6px;
            border-radius: 1.5rem;
            transition: all 0.2s ease;
        }
        .dark .card-3d {
            border-color: rgba(255,255,255,0.05);
            border-bottom-width: 6px;
        }
        .card-3d:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        /* --- Animations --- */
        @keyframes flipIn {
            0% { transform: perspective(600px) rotateY(90deg) scale(0.8); opacity: 0; }
            100% { transform: perspective(600px) rotateY(0deg) scale(1); opacity: 1; }
        }
        .flip-in { animation: flipIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass-panel {
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        /* Compare Slider */
        .img-compare-wrapper { position: relative; overflow: hidden; touch-action: pan-y; isolation: isolate;}
        .img-before { display: block; width: 100%; height: 100%; object-fit: contain; }
        .img-after { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; object-fit: contain; background: var(--bg-color); pointer-events: none; }
        .slider-handle { position: absolute; top: 0; bottom: 0; width: 4px; background: white; z-index: 10; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5);}
        .slider-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border-radius: 50%; background: var(--primary-color);
            border: 4px solid white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 0 var(--primary-dark);
        }
        input[type=range].compare-slider {
            position: absolute; width: 100%; top: 0; bottom: 0; margin: 0; appearance: none;
            background: transparent; z-index: 20; opacity: 0; cursor: ew-resize; outline:none;
        }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-primary selection:text-white pb-[env(safe-area-inset-bottom)]">
    <div id="root"></div>

    <script type="text/babel">

        // --- IndexedDB ---
        const DB_NAME = 'AI_Doc_Studio_3D';
        const STORE_NAME = 'scan_projects';
        
        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const dbOp = async (type, payload = null) => {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, type === 'get' || type === 'getAll' ? 'readonly' : 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                let request;
                if (type === 'getAll') request = store.getAll();
                else if (type === 'save') request = store.put(payload);
                else if (type === 'delete') request = store.delete(payload);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        // --- 16 Colors ---
        const THEMES = [
            { main: '#1cb0f6', dark: '#1899d6' }, { main: '#78c800', dark: '#58a700' },
            { main: '#ff4b4b', dark: '#ea2b2b' }, { main: '#ffc800', dark: '#e5b400' },
            { main: '#ce82ff', dark: '#a559d6' }, { main: '#2b70c9', dark: '#205496' },
            { main: '#00e0e0', dark: '#00b3b3' }, { main: '#ff9600', dark: '#cc7800' },
            { main: '#ff82c8', dark: '#d659a0' }, { main: '#8c8c8c', dark: '#666666' },
            { main: '#4b4b4b', dark: '#333333' }, { main: '#00a000', dark: '#007a00' },
            { main: '#d22828', dark: '#a31f1f' }, { main: '#a028c8', dark: '#7a1f99' },
            { main: '#0082c8', dark: '#006296' }, { main: '#e0a000', dark: '#b38000' }
        ];

        // --- Playful Audio ---
        const playTone = (type, enabled) => {
            if (!enabled) return;
            if(window.navigator && window.navigator.vibrate) navigator.vibrate(15);
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            
            if (type === 'pop') {
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, ctx.currentTime); 
                gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start(); osc.stop(ctx.currentTime + 0.4);
            }
        };

        // --- 3D Icons ---
        const Icon = {
            home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            settings: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            add: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            gallery: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
            trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            zip: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
            pdf: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            download: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            share: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            arrowLTR: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>,
            arrowRTL: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,
        };

        const App = () => {
            const [view, setView] = React.useState(null); 
            const [activeTab, setActiveTab] = React.useState('HOME'); 
            
            const [settings, setSettings] = React.useState({ 
                lang: 'ar', isDark: false, colorTheme: THEMES[0], sound: true, intensity: 185 
            });
            const [projects, setProjects] = React.useState([]);
            const [currProject, setCurrProject] = React.useState(null);
            const [imgIndex, setImgIndex] = React.useState(0);

            React.useEffect(() => {
                const s = localStorage.getItem('DocScan3D_Settings');
                if (s) { 
                    const parsed = JSON.parse(s); 
                    if(!parsed.intensity) parsed.intensity = 185; // Fallback for old saves
                    setSettings(parsed); 
                    applySkin(parsed.colorTheme, parsed.isDark); 
                } else { 
                    applySkin(settings.colorTheme, settings.isDark); 
                }
                grabHistory();
            }, []);

            React.useEffect(() => {
                localStorage.setItem('DocScan3D_Settings', JSON.stringify(settings));
                applySkin(settings.colorTheme, settings.isDark);
                settings.isDark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
            }, [settings]);

            const applySkin = (theme, isDark) => {
                const r = document.documentElement;
                r.style.setProperty('--primary-color', theme.main);
                r.style.setProperty('--primary-dark', theme.dark);
            };

            const grabHistory = async () => { try { const p = await dbOp('getAll'); setProjects(p.sort((a,b)=>b.id-a.id)); } catch(e){} };

            const snd = (type='pop') => playTone(type, settings.sound);

            // --- Image Processing Engine ---
            const smartFilterEngine = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width; canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            const dat = imgData.data;
                            
                            const threshold = parseInt(settings.intensity);

                            for (let i = 0; i < dat.length; i += 4) {
                                const R = dat[i]; const G = dat[i+1]; const B = dat[i+2];
                                const lum = R * 0.299 + G * 0.587 + B * 0.114;
                                const contrastDev = Math.max(R,G,B) - Math.min(R,G,B);

                                if (lum > threshold || (lum > threshold - 45 && contrastDev > 15)) {
                                    dat[i]=255; dat[i+1]=255; dat[i+2]=255; 
                                } else {
                                    if(lum < 90) { dat[i]-=15; dat[i+1]-=15; dat[i+2]-=15; }
                                }
                            }
                            ctx.putImageData(imgData, 0, 0);
                            resolve({ n: file.name, oURL: e.target.result, rURL: canvas.toDataURL('image/jpeg', 0.88) });
                        }; img.src = e.target.result;
                    }; reader.readAsDataURL(file);
                });
            };

            const dispatchScannerFlow = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                snd('pop'); setView('LOADING');

                let cluster = [];
                for (let f of files) {
                    if (f.type.startsWith('image/')) {
                        const processedData = await smartFilterEngine(f);
                        cluster.push(processedData);
                    }
                }
                
                const rec = { id: Date.now(), nm: `مشروع ${new Date().toLocaleDateString('ar-EG')}`, dSet: cluster };
                await dbOp('save', rec);
                snd('success');
                await grabHistory();
                setCurrProject(rec);
                setView('PROJECT');
                e.target.value = ''; 
            };

            // --- Export Functions ---
            const expZIP = async (proj) => {
                snd(); const zip = new JSZip();
                proj.dSet.forEach((itm, i) => { zip.file(`Image_${i+1}.jpg`, itm.rURL.split(',')[1], {base64:true}); });
                const bx = await zip.generateAsync({type:"blob"});
                const anchor = document.createElement('a');
                anchor.href = URL.createObjectURL(bx); anchor.download = `${proj.nm}.zip`;
                anchor.click();
            };

            const expPDF = (proj) => {
                snd(); const { jsPDF } = window.jspdf; 
                const pr_doc = new jsPDF('p', 'mm', 'a4'); 
                proj.dSet.forEach((item, j) => {
                    if (j > 0) pr_doc.addPage();
                    const spec = pr_doc.getImageProperties(item.rURL);
                    const doc_W = pr_doc.internal.pageSize.getWidth();
                    const doc_H = (spec.height * doc_W) / spec.width;
                    pr_doc.addImage(item.rURL, 'JPEG', 0, 0, doc_W, doc_H);
                }); pr_doc.save(`${proj.nm}.pdf`);
            };

            const downloadAllDirect = async (proj) => {
                snd();
                for (let i = 0; i < proj.dSet.length; i++) {
                    const anchor = document.createElement('a');
                    anchor.href = proj.dSet[i].rURL;
                    anchor.download = `Clean_${i+1}.jpg`;
                    anchor.click();
                    await new Promise(r => setTimeout(r, 300)); // Delay to prevent browser blocking
                }
            };

            const downloadSingle = (url, name) => {
                snd();
                const anchor = document.createElement('a');
                anchor.href = url; anchor.download = `Clean_${name}.jpg`;
                anchor.click();
            };

            const shareProject = async (proj) => {
                snd();
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: proj.nm,
                            text: 'تم تعديل هذه الصور باستخدام تطبيق المسح الذكي!',
                        });
                    } catch (err) { console.log('Share failed', err); }
                } else {
                    alert('المشاركة غير مدعومة في هذا المتصفح');
                }
            };

            const deleteProject = async (id) => {
                snd();
                if(confirm('هل أنت متأكد من حذف هذا المشروع؟')) {
                    await dbOp('delete', id);
                    await grabHistory();
                    if(currProject?.id === id) setView(null);
                }
            };

            // --- Views ---
            if (view === 'LOADING') return (
                <div className="fixed inset-0 bgApp z-50 flex flex-col items-center justify-center pop-in">
                     <div className="w-24 h-24 border-8 border-gray-200 border-t-primary rounded-full animate-spin mb-6"></div>
                     <h2 className="text-2xl font-bold text-gray-800 dark:text-white">جاري التنظيف...</h2>
                </div>
            );

            if (view === 'PROJECT' && currProject) return (
                <div className="fixed inset-0 z-40 bgApp overflow-y-auto overflow-x-hidden hide-scroll pop-in">
                    
                    {/* Top Bar */}
                    <div className="sticky top-0 glass-panel px-4 py-4 z-20 flex justify-between items-center rounded-b-3xl shadow-sm mb-4">
                         <button onClick={()=>{snd(); setView(null);}} className="btn-3d w-12 h-12 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-2xl flex items-center justify-center border-gray-200 dark:border-gray-700">
                             <div className="w-6 h-6 rtl:hidden">{Icon.arrowLTR}</div><div className="w-6 h-6 ltr:hidden">{Icon.arrowRTL}</div>
                         </button>
                         <h2 className="text-lg font-bold dark:text-white truncate px-2">{currProject.nm}</h2>
                         <button onClick={()=>deleteProject(currProject.id)} className="btn-3d w-12 h-12 bg-red-100 text-red-500 rounded-2xl flex items-center justify-center border-red-200">
                            <div className="w-6 h-6">{Icon.trash}</div>
                         </button>
                    </div>
                    
                    {/* Image Grid */}
                    <div className="p-4 grid grid-cols-2 md:grid-cols-3 gap-4 pb-32">
                         {currProject.dSet.map((entry, index) => (
                             <div key={index} 
                                  onClick={()=>{snd(); setImgIndex(index); setView('IMAGE_DETAIL');}} 
                                  className="card-3d glass-panel p-2 flex items-center justify-center cursor-pointer flip-in"
                                  style={{animationDelay: `${index * 0.1}s`}}>
                                  <div className="w-full aspect-[3/4] rounded-xl overflow-hidden bg-gray-100 dark:bg-gray-800 flex items-center justify-center">
                                     <img src={entry.rURL} className="w-full h-full object-contain" />
                                  </div>
                             </div>
                         ))}
                    </div>

                    {/* Bottom Action Bar */}
                    <div className="fixed bottom-0 inset-x-0 p-4 z-30 pointer-events-none flex justify-center">
                        <div className="pointer-events-auto w-full max-w-md glass-panel rounded-3xl p-3 flex gap-2 shadow-lg">
                             <button onClick={()=>downloadAllDirect(currProject)} className="btn-3d flex-1 bg-white dark:bg-gray-800 text-primary border-gray-200 dark:border-gray-700 rounded-2xl py-3 flex flex-col items-center justify-center gap-1">
                                  <span className="w-6 h-6">{Icon.download}</span> <span className="text-xs font-bold">الكل</span>
                             </button>
                             <button onClick={()=>expZIP(currProject)} className="btn-3d flex-1 bg-white dark:bg-gray-800 text-primary border-gray-200 dark:border-gray-700 rounded-2xl py-3 flex flex-col items-center justify-center gap-1">
                                  <span className="w-6 h-6">{Icon.zip}</span> <span className="text-xs font-bold">ZIP</span>
                             </button>
                             <button onClick={()=>expPDF(currProject)} className="btn-3d flex-[1.5] bg-primary text-white border-primaryDark rounded-2xl py-3 flex flex-col items-center justify-center gap-1">
                                  <span className="w-6 h-6">{Icon.pdf}</span> <span className="text-xs font-bold">PDF</span>
                             </button>
                             <button onClick={()=>shareProject(currProject)} className="btn-3d flex-1 bg-white dark:bg-gray-800 text-primary border-gray-200 dark:border-gray-700 rounded-2xl py-3 flex flex-col items-center justify-center gap-1">
                                  <span className="w-6 h-6">{Icon.share}</span> <span className="text-xs font-bold">شارك</span>
                             </button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'IMAGE_DETAIL' && currProject) {
                const docInst = currProject.dSet[imgIndex];
                return (
                     <div className="fixed inset-0 z-[60] bgApp flex flex-col hide-scroll pop-in">
                        <div className="p-4 flex justify-between items-center z-20">
                             <button onClick={()=>{snd(); setView('PROJECT');}} className="btn-3d w-12 h-12 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 rounded-2xl flex items-center justify-center border-gray-200 dark:border-gray-700">
                                 <div className="w-6 h-6 rtl:hidden">{Icon.arrowLTR}</div><div className="w-6 h-6 ltr:hidden">{Icon.arrowRTL}</div>
                             </button>
                             <div className="font-bold text-gray-700 dark:text-gray-200 glass-panel px-4 py-2 rounded-2xl">
                                 {imgIndex + 1} / {currProject.dSet.length}
                             </div>
                             <button onClick={()=>downloadSingle(docInst.rURL, imgIndex)} className="btn-3d w-12 h-12 bg-primary text-white rounded-2xl flex items-center justify-center border-primaryDark">
                                 <div className="w-6 h-6">{Icon.download}</div>
                             </button>
                        </div>

                        <div className="flex-1 w-full max-w-xl mx-auto flex items-center justify-center p-4 overflow-hidden z-10">
                           <ImageComparer orig={docInst.oURL} pure={docInst.rURL} />
                        </div>
                        
                        <div className="p-6 z-20 flex gap-4 justify-center max-w-sm mx-auto w-full">
                             <button onClick={()=>{snd(); setImgIndex(c=>c-1);}} disabled={imgIndex===0} 
                                  className={`btn-3d flex-1 py-4 rounded-2xl bg-white dark:bg-gray-800 text-primary border-gray-200 dark:border-gray-700 flex justify-center items-center ${imgIndex===0 ? 'opacity-50 pointer-events-none': ''}`}>
                                   <div className="w-8 h-8 rtl:hidden">{Icon.arrowLTR}</div><div className="w-8 h-8 ltr:hidden">{Icon.arrowRTL}</div>
                             </button>
                             <button onClick={()=>{snd(); setImgIndex(c=>c+1);}} disabled={imgIndex===currProject.dSet.length-1}
                                  className={`btn-3d flex-1 py-4 rounded-2xl bg-white dark:bg-gray-800 text-primary border-gray-200 dark:border-gray-700 flex justify-center items-center ${imgIndex===currProject.dSet.length-1 ? 'opacity-50 pointer-events-none': ''}`}>
                                   <div className="w-8 h-8 rtl:hidden">{Icon.arrowRTL}</div><div className="w-8 h-8 ltr:hidden">{Icon.arrowLTR}</div>
                             </button>
                        </div>
                     </div>
                );
            }

            // --- Main Tabs ---
            return (
                <div className="h-screen w-full flex flex-col relative bgApp pb-[90px]">
                    { activeTab === 'HOME' && (
                        <div className="flex-1 overflow-y-auto px-5 pt-8 pop-in">
                            <h1 className="text-3xl font-black text-gray-800 dark:text-white mb-6">مشاريعي</h1>

                            {projects.length === 0 ? (
                                <div className="mt-20 flex flex-col items-center justify-center text-center">
                                    <div className="w-32 h-32 bg-gray-200 dark:bg-gray-800 rounded-full flex items-center justify-center text-gray-400 mb-6">
                                        <div className="w-16 h-16">{Icon.gallery}</div>
                                    </div>
                                    <p className="font-bold text-xl text-gray-800 dark:text-gray-200 mb-2">لا توجد مشاريع بعد!</p>
                                    <p className="text-gray-500">اضغط على زر الإضافة لرفع الصور</p>
                                </div>
                            ) : (
                                <div className="flex flex-col gap-4">
                                   {projects.map((pr, index) => (
                                       <div key={pr.id} 
                                            className="card-3d glass-panel p-3 flex gap-4 items-center cursor-pointer flip-in"
                                            style={{animationDelay: `${index * 0.05}s`}} 
                                            onClick={()=>{snd(); setCurrProject(pr); setView('PROJECT');}}>
                                             
                                             <div className="w-20 h-24 bg-gray-100 dark:bg-gray-800 rounded-xl flex items-center justify-center overflow-hidden p-1 shrink-0">
                                                 {pr.dSet[0] && <img src={pr.dSet[0].rURL} className="w-full h-full object-contain rounded" />}
                                             </div>
                                             
                                             <div className="flex-1 py-1 flex flex-col justify-center">
                                                 <h4 className="font-bold text-lg text-gray-800 dark:text-white truncate mb-1">{pr.nm}</h4>
                                                 <span className="text-sm text-gray-500 mb-2">{new Date(pr.id).toLocaleDateString('ar-EG')}</span>
                                                 <div className="self-start bg-primary/20 text-primary text-xs font-bold px-3 py-1 rounded-lg">
                                                     {pr.dSet.length} صور
                                                 </div>
                                             </div>
                                       </div>
                                   ))}
                                </div>
                            )}
                        </div>
                    )}

                    { activeTab === 'SETTINGS' && (
                         <div className="flex-1 overflow-y-auto px-5 pt-8 pop-in">
                             <h1 className="text-3xl font-black text-gray-800 dark:text-white mb-6">الإعدادات</h1>
                             
                             <div className="flex flex-col gap-6 pb-8">
                                {/* Color Picker */}
                                <div className="card-3d glass-panel p-5">
                                    <h3 className="font-bold text-lg mb-4 dark:text-white">لون التطبيق</h3>
                                    <div className="grid grid-cols-4 gap-3">
                                        {THEMES.map((t, i) => (
                                            <button key={i} onClick={()=>{snd(); setSettings({...settings, colorTheme: t})}}
                                                className={`w-full aspect-square rounded-2xl btn-3d flex items-center justify-center`}
                                                style={{ backgroundColor: t.main, borderColor: t.dark, borderWidth: settings.colorTheme.main === t.main ? '4px' : '0px', borderBottomWidth: '4px' }}>
                                                {settings.colorTheme.main === t.main && <div className="w-4 h-4 bg-white rounded-full"></div>}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Watermark Intensity Slider */}
                                <div className="card-3d glass-panel p-5">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-lg dark:text-white">قوة التنظيف</h3>
                                        <button onClick={()=>{snd(); setSettings({...settings, intensity: 185})}} className="text-sm text-primary font-bold bg-primary/10 px-3 py-1 rounded-xl">افتراضي</button>
                                    </div>
                                    <input type="range" min="100" max="240" value={settings.intensity} 
                                        onChange={(e)=>setSettings({...settings, intensity: e.target.value})}
                                        className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary" />
                                    <p className="text-xs text-gray-500 mt-2 text-center">اسحب لتعديل سُمك إزالة العلامة المائية</p>
                                </div>

                                {/* Toggles */}
                                <div className="card-3d glass-panel p-5 flex flex-col gap-4">
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-lg dark:text-white">الأصوات المرحة</span>
                                        <button onClick={()=>{snd(); setSettings({...settings, sound: !settings.sound})}} 
                                            className={`w-14 h-8 rounded-full p-1 transition-colors ${settings.sound ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'}`}>
                                            <div className={`w-6 h-6 bg-white rounded-full transition-transform ${settings.sound ? 'translate-x-[-24px]' : 'translate-x-0'}`}></div>
                                        </button>
                                    </div>
                                    <hr className="border-gray-200 dark:border-gray-700" />
                                    <div className="flex justify-between items-center">
                                        <span className="font-bold text-lg dark:text-white">الوضع الليلي</span>
                                        <button onClick={()=>{snd(); setSettings({...settings, isDark: !settings.isDark})}} 
                                            className={`w-14 h-8 rounded-full p-1 transition-colors ${settings.isDark ? 'bg-primary' : 'bg-gray-300 dark:bg-gray-600'}`}>
                                            <div className={`w-6 h-6 bg-white rounded-full transition-transform ${settings.isDark ? 'translate-x-[-24px]' : 'translate-x-0'}`}></div>
                                        </button>
                                    </div>
                                </div>
                             </div>
                         </div>
                    )}

                   {/* Bottom Navigation Bar */}
                   <div className="fixed inset-x-0 bottom-0 p-4 z-40 pointer-events-none flex justify-center">
                       <div className="pointer-events-auto w-full max-w-md glass-panel rounded-3xl h-20 flex items-center justify-between px-6 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
                            
                            <button onClick={()=>{snd(); setActiveTab('HOME');}} className={`flex flex-col items-center gap-1 transition-all ${activeTab==='HOME'?'text-primary scale-110':'text-gray-400'}`}>
                                <div className="w-8 h-8">{Icon.home}</div> 
                            </button>

                            {/* FAB Add Files Button */}
                            <div className="relative -top-8">
                                <label className="btn-3d w-20 h-20 bg-primary text-white rounded-[2rem] flex items-center justify-center cursor-pointer border-primaryDark shadow-lg">
                                    <input type="file" multiple accept="image/*" className="hidden" onChange={dispatchScannerFlow} />
                                    <div className="w-10 h-10">{Icon.add}</div>
                                </label>
                            </div>

                            <button onClick={()=>{snd(); setActiveTab('SETTINGS');}} className={`flex flex-col items-center gap-1 transition-all ${activeTab==='SETTINGS'?'text-primary scale-110':'text-gray-400'}`}>
                                <div className="w-8 h-8">{Icon.settings}</div>
                            </button>
                       </div>
                   </div>
                </div>
            );
        }

        // --- Compare Slider Component ---
        const ImageComparer = ({orig, pure}) => {
             const [pos, setPos] = React.useState(50);
             return (
                 <div className="img-compare-wrapper rounded-3xl overflow-hidden shadow-lg relative w-full h-full max-h-[70vh] glass-panel border-4 border-white dark:border-gray-700">
                        <img className="img-before" src={orig} />
                        <img className="img-after" src={pure} style={{ clipPath: `inset(0 0 0 ${100-pos}%)` }} />
                        
                        <div className="slider-handle" style={{ right: `${pos}%` }}>
                            <div className="slider-button">
                                 <div className="w-6 h-6 text-white">{Icon.arrowRTL}</div>
                            </div>
                        </div>
                        <input type="range" min="0" max="100" value={pos} onChange={(e)=>setPos(e.target.value)} className="compare-slider" />

                        <div className="absolute top-4 right-4 bg-black/60 text-white px-3 py-1 rounded-xl text-sm font-bold backdrop-blur">قبل</div>
                        <div className="absolute top-4 left-4 bg-primary text-white px-3 py-1 rounded-xl text-sm font-bold shadow-md">بعد</div>
                 </div>
             )
        };

        const r = ReactDOM.createRoot(document.getElementById('root'));
        r.render(<App />);
    </script>
</body>
</html>
