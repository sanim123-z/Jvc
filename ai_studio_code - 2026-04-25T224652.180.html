<!DOCTYPE html>
<html lang="ar" dir="rtl" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- ربط ملف manifest لتحويل الموقع لتطبيق -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1cb0f6">
    <!-- أيقونة جديدة وجميلة -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2055/2055568.png">

    <title>المسح الذكي</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2055/2055568.png">
    
    <!-- React & DOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Libraries (ZIP & PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- تسجيل Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker Registered!', reg);
                }).catch(err => console.error('Service Worker Registration Failed', err));
            });
        }
    </script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--primary-color)',
                        primaryDark: 'var(--primary-dark)',
                        surface: 'var(--surface-color)',
                        bgApp: 'var(--bg-color)',
                    },
                    boxShadow: {
                        '3d': '0 4px 0 0 var(--primary-dark)',
                        '3d-gray': '0 4px 0 0 rgba(0,0,0,0.15)',
                        '3d-dark': '0 4px 0 0 rgba(255,255,255,0.1)',
                    },
                    animation: {
                        'scan': 'scan 1.5s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        scan: {
                            '0%': { top: '0%' },
                            '100%': { top: '95%' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary-color: #1cb0f6;
            --primary-dark: #1899d6;
            --surface-color: #ffffff;
            --bg-color: #f7f9fa;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }
        .dark {
            --surface-color: #131f24;
            --bg-color: #0b1416;
            --glass-bg: rgba(19, 31, 36, 0.7);
            color: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Nunito', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* --- 3D Buttons & Elements --- */
        .btn-3d {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom-width: 4px;
        }
        .btn-3d:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }
        /* زر مضغوط مسبقاً (للتصغير الافتراضي) */
        .btn-3d-pressed {
            border-bottom-width: 0px !important;
            transform: translateY(4px) !important;
            opacity: 0.7;
        }

        .card-3d {
            border: 2px solid rgba(0,0,0,0.05);
            border-bottom-width: 6px;
            border-radius: 1.5rem;
            transition: all 0.2s ease;
        }
        .dark .card-3d {
            border-color: rgba(255,255,255,0.05);
            border-bottom-width: 6px;
        }
        .card-3d:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        /* --- Animations --- */
        @keyframes flipIn {
            0% { transform: perspective(600px) rotateY(90deg) scale(0.8); opacity: 0; }
            100% { transform: perspective(600px) rotateY(0deg) scale(1); opacity: 1; }
        }
        .flip-in { animation: flipIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .dark .glass-panel {
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        /* Compare Slider */
        .img-compare-wrapper { position: relative; overflow: hidden; touch-action: pan-y; isolation: isolate;}
        .img-before { display: block; width: 100%; height: 100%; object-fit: contain; }
        .img-after { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; object-fit: contain; background: var(--bg-color); pointer-events: none; }
        .slider-handle { position: absolute; top: 0; bottom: 0; width: 4px; background: white; z-index: 10; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5);}
        .slider-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border-radius: 50%; background: var(--primary-color);
            border: 4px solid white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 0 var(--primary-dark);
        }
        input[type=range].compare-slider {
            position: absolute; width: 100%; top: 0; bottom: 0; margin: 0; appearance: none;
            background: transparent; z-index: 20; opacity: 0; cursor: ew-resize; outline:none;
        }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .snap-container { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .snap-item { scroll-snap-align: center; }

        /* Crosshair for Color Picker */
        .crosshair-h { position: absolute; top: 50%; left: 10%; right: 10%; height: 2px; background: rgba(255,255,255,0.8); transform: translateY(-50%); mix-blend-mode: difference; }
        .crosshair-v { position: absolute; left: 50%; top: 10%; bottom: 10%; width: 2px; background: rgba(255,255,255,0.8); transform: translateX(-50%); mix-blend-mode: difference; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-primary selection:text-white pb-[env(safe-area-inset-bottom)]">
    <div id="root"></div>

    <script type="text/babel">

        // --- IndexedDB ---
        const DB_NAME = 'AI_Doc_Studio_3D';
        const STORE_NAME = 'scan_projects';
        
        const initDB = () => {
            return new Promise((resolve, reject) => {
                try {
                    const request = indexedDB.open(DB_NAME, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    };
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                } catch (e) { reject(e); }
            });
        };

        const dbOp = async (type, payload = null) => {
            try {
                const db = await initDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, type === 'get' || type === 'getAll' ? 'readonly' : 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    let request;
                    if (type === 'getAll') request = store.getAll();
                    else if (type === 'save') request = store.put(payload);
                    else if (type === 'delete') request = store.delete(payload);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            } catch (error) {
                return type === 'getAll' ?[] : null;
            }
        };

        // --- 16 Colors ---
        const THEMES =[
            { main: '#1cb0f6', dark: '#1899d6' }, { main: '#78c800', dark: '#58a700' },
            { main: '#ff4b4b', dark: '#ea2b2b' }, { main: '#ffc800', dark: '#e5b400' },
            { main: '#ce82ff', dark: '#a559d6' }, { main: '#2b70c9', dark: '#205496' },
            { main: '#00e0e0', dark: '#00b3b3' }, { main: '#ff9600', dark: '#cc7800' },
            { main: '#ff82c8', dark: '#d659a0' }, { main: '#8c8c8c', dark: '#666666' },
            { main: '#4b4b4b', dark: '#333333' }, { main: '#00a000', dark: '#007a00' },
            { main: '#d22828', dark: '#a31f1f' }, { main: '#a028c8', dark: '#7a1f99' },
            { main: '#0082c8', dark: '#006296' }, { main: '#e0a000', dark: '#b38000' }
        ];

        // --- Playful Audio ---
        const playTone = (type, enabled) => {
            if (!enabled) return;
            try { if(window.navigator && window.navigator.vibrate) navigator.vibrate(15); } catch(e){}
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            
            if (type === 'pop') {
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if (type === 'success') {
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, ctx.currentTime); 
                gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                osc.start(); osc.stop(ctx.currentTime + 0.4);
            }
        };

        // --- 3D Icons ---
        const Icon = {
            home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            settings: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            add: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,

            trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            zip: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
            pdf: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            download: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            share: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
            arrowLTR: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>,
            arrowRTL: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,
            check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            smartphone: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="3" ry="3"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>,
            monitor: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>,
            sliders: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>,
            text: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>,
            colorPicker: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>,
            zoomIn: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>,
            zoomOut: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>,
            help: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            palette: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"></circle><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"></circle><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"></circle><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>
        };

        const App = () => {
            const[view, setView] = React.useState(null); 
            const[activeTab, setActiveTab] = React.useState('HOME'); 
            
            const[settings, setSettings] = React.useState({ 
                lang: 'ar', 
                isDark: false, 
                colorTheme: THEMES[0], 
                sound: true, 
                intensity: 185,
                layoutMode: window.innerWidth > 768 ? 'desktop' : 'phone'
            });
            const[projects, setProjects] = React.useState([]);
            const[currProject, setCurrProject] = React.useState(null);
            const[imgIndex, setImgIndex] = React.useState(0);

            // حالات إعدادات التنظيف 
            const[showProjSettings, setShowProjSettings] = React.useState(false);
            const[projIntensity, setProjIntensity] = React.useState(185);
            const lastProjIntensity = React.useRef(185);
            const[isProcessingProj, setIsProcessingProj] = React.useState(false);

            const[showImgSettings, setShowImgSettings] = React.useState(false);
            const[localIntensity, setLocalIntensity] = React.useState(185);
            const lastProcessedIntensity = React.useRef(185);
            const[isProcessingImg, setIsProcessingImg] = React.useState(false);

            // حالات إعدادات إضافة النص/العلامة المائية الجديدة
            const[showTextSettings, setShowTextSettings] = React.useState(false);
            const[wmText, setWmText] = React.useState('');
            const[wmColor, setWmColor] = React.useState(THEMES[0].main);
            const[wmRotation, setWmRotation] = React.useState(-30); 
            const [wmSize, setWmSize] = React.useState(100); 

            // حالات ميزة مسح اللون الجديدة والتكبير
            const[colorEraserMode, setColorEraserMode] = React.useState(false);
            const[pickedColor, setPickedColor] = React.useState(null);
            const [isPicking, setIsPicking] = React.useState(false);
            const[showConfirmEraser, setShowConfirmEraser] = React.useState(false);
            const canvasRef = React.useRef(null);
            const pressTimer = React.useRef(null);
            
            // التكبير والتصغير
            const [zoomLevel, setZoomLevel] = React.useState(1);
            const [panOrigin, setPanOrigin] = React.useState({x: 50, y: 50});
            const [autoPalette, setAutoPalette] = React.useState([]);
            const[showPalette, setShowPalette] = React.useState(false);

            // الإضافات الخاصة برفع الملفات (الضغطة المطولة، اللصق، السحب، الروابط)
            const fileInputRef = React.useRef(null);
            const addPressTimer = React.useRef(null);
            const isLongPress = React.useRef(false);
            const [showAdvancedAdd, setShowAdvancedAdd] = React.useState(false);
            const [imgUrlInput, setImgUrlInput] = React.useState('');
            const [isDragging, setIsDragging] = React.useState(false);

            const isDesktop = settings.layoutMode === 'desktop';

            React.useEffect(() => {
                try {
                    const s = localStorage.getItem('DocScan3D_Settings');
                    if (s) { 
                        const parsed = JSON.parse(s); 
                        if(!parsed.intensity) parsed.intensity = 185; 
                        if(!parsed.layoutMode) parsed.layoutMode = window.innerWidth > 768 ? 'desktop' : 'phone'; 
                        setSettings(parsed); 
                        applySkin(parsed.colorTheme, parsed.isDark); 
                        setWmColor(parsed.colorTheme.main);
                    } else { 
                        applySkin(settings.colorTheme, settings.isDark); 
                    }
                } catch(e) {
                    applySkin(settings.colorTheme, settings.isDark);
                }
                grabHistory();

                const checkIncomingSharedFiles = async () => {
                    try {
                        const db = await new Promise((resolve, reject) => {
                            const request = indexedDB.open('AI_Doc_Studio_Shared', 1);
                            request.onupgradeneeded = (e) => {
                                if (!e.target.result.objectStoreNames.contains('shared_files')) {
                                    e.target.result.createObjectStore('shared_files', { autoIncrement: true });
                                }
                            };
                            request.onsuccess = () => resolve(request.result);
                            request.onerror = () => reject(request.error);
                        });
                        
                        if(db.objectStoreNames.contains('shared_files')) {
                            const tx = db.transaction('shared_files', 'readwrite');
                            const store = tx.objectStore('shared_files');
                            const getAllReq = store.getAll();
                            
                            getAllReq.onsuccess = async () => {
                                const files = getAllReq.result;
                                if (files && files.length > 0) {
                                    store.clear();
                                    await handleIncomingSharedFiles(files);
                                }
                            };
                        }
                    } catch (e) { console.log('No incoming shared files', e); }
                };

            // --- Image Processing Engine Reusable Functions ---
            const processPixels = (img, threshold) => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const dat = imgData.data;
                    
                    for (let i = 0; i < dat.length; i += 4) {
                        const R = dat[i]; const G = dat[i+1]; const B = dat[i+2];
                        const lum = R * 0.299 + G * 0.587 + B * 0.114;
                        const contrastDev = Math.max(R,G,B) - Math.min(R,G,B);

                        if (lum > threshold || (lum > threshold - 45 && contrastDev > 15)) {
                            dat[i]=255; dat[i+1]=255; dat[i+2]=255; 
                        } else {
                            if(lum < 90) { dat[i]-=15; dat[i+1]-=15; dat[i+2]-=15; }
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg', 0.88));
                });
            };

            const reprocessImageFromURL = (oURL, threshold) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = async () => {
                        const rURL = await processPixels(img, threshold);
                        resolve(rURL);
                    };
                    img.src = oURL;
                });
            };

            const smartFilterEngine = (file, threshold) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const oURL = e.target.result;
                        const img = new Image();
                        img.onload = async () => {
                            const rURL = await processPixels(img, threshold);
                            resolve({ n: file.name, oURL, rURL }); 
                        }; 
                        img.src = oURL;
                    }; reader.readAsDataURL(file);
                });
            };

            const applyTextToImage = (base64Img, text, color, rotation = -30, size = 100) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        if (text && text.trim() !== '') {
                            const baseFontSize = Math.max(img.width / 12, 40);
                            const finalFontSize = baseFontSize * (size / 100);
                            
                            ctx.font = `bold ${finalFontSize}px 'Nunito', sans-serif`;
                            ctx.fillStyle = color;
                            ctx.globalAlpha = 0.5; 
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';

                            ctx.translate(canvas.width / 2, canvas.height / 2);
                            ctx.rotate((rotation * Math.PI) / 180); 
                            ctx.fillText(text, 0, 0);
                        }
                        resolve(canvas.toDataURL('image/jpeg', 0.88));
                    };
                    img.src = base64Img;
                });
            };

            // --- دوال ميزة مسح اللون والتكبير ---
            const extractAutoPalette = (ctx, canvas) => {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const colors =[];
                const step = Math.floor((canvas.width * canvas.height) / 800) * 4; 
                for (let i = 0; i < imgData.length; i += step) {
                    const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
                    const qr = Math.round(r / 64) * 64;
                    const qg = Math.round(g / 64) * 64;
                    const qb = Math.round(b / 64) * 64;
                    const hex = `${qr},${qg},${qb}`;
                    
                    if ((qr>240 && qg>240 && qb>240) || (qr<20 && qg<20 && qb<20)) continue;

                    if (!colors.some(c => c.hex === hex)) {
                        colors.push({hex, rgb:[r,g,b]});
                    }
                }
                setAutoPalette(colors.slice(0, 7).map(c => c.rgb));
            };

            const handlePointerDownEraser = (e) => {

                const rect = canvasRef.current.getBoundingClientRect();
                const xPct = ((e.clientX - rect.left) / rect.width) * 100;
                const yPct = ((e.clientY - rect.top) / rect.height) * 100;

                pressTimer.current = setTimeout(() => {
                    snd('pop');
                    setIsPicking(true);
                    handlePointerMoveEraser(e);

                canvasRef.current.dataset.clickX = xPct;

            const handlePointerMoveEraser = (e) => {

                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                    const pixel = ctx.getImageData(x, y, 1, 1).data;

                        if (dist < tolerance) {

                        </div>
                        <input type="range" min="0" max="100" value={pos} onChange={(e)=>setPos(e.target.value)} className="compare-slider" />

                        <div className="absolute top-4 right-4 bg-black/60 text-white px-3 py-1 rounded-xl text-sm font-bold backdrop-blur">قبل</div>
                        <div className="absolute top-4 left-4 bg-primary text-white px-3 py-1 rounded-xl text-sm font-bold shadow-md">بعد</div>
                 </div>
             )
        };

        const r = ReactDOM.createRoot(document.getElementById('root'));
        r.render(<App />);
    </script>
</body>
</html>
